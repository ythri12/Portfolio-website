<!DOCTYPE html>
<html>
<head>
<title>Contact</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Contact Me</h1>
</header>

<main>

<section>

<form>

<label for="name">Name</label><br>
<input type="text" id="name" aria-label="Name"><br><br>

<label for="email">Email</label><br>
<input type="email" id="email" aria-label="Email"><br><br>

<label for="message">Message</label><br>
<textarea id="message" aria-label="Message"></textarea><br><br>

<button type="submit">Send</button>

</form>

</section>

</main>

</body>
</html>
